<svg width="860" height="480" viewBox="0 0 860 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="480" fill="#040A14"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="860" height="52" fill="#0B1220"/>
  <rect x="20" y="15" width="180" height="22" rx="11" fill="#6366F1" fill-opacity="0.9"/>
  <text x="35" y="31" fill="white" font-size="12" font-family="system-ui" font-weight="600">ML Robot Vision</text>
  <circle cx="770" cy="26" r="7" fill="#34d399"/>
  <text x="785" y="31" fill="#34d399" font-size="11" font-family="system-ui">LIVE</text>

  <!-- Camera feed - left -->
  <rect x="20" y="62" width="380" height="250" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Camera grid overlay -->
  <line x1="147" y1="62" x2="147" y2="312" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="273" y1="62" x2="273" y2="312" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="20" y1="146" x2="400" y2="146" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="20" y1="228" x2="400" y2="228" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Object detection boxes -->
  <rect x="80" y="90" width="120" height="140" rx="4" fill="none" stroke="#34d399" stroke-width="2"/>
  <rect x="80" y="90" width="80" height="18" rx="0" fill="#34d399"/>
  <text x="86" y="102" fill="white" font-size="10" font-family="monospace">Target 97.3%</text>

  <rect x="240" y="150" width="100" height="110" rx="4" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="240" y="150" width="80" height="18" rx="0" fill="#f59e0b"/>
  <text x="246" y="163" fill="white" font-size="10" font-family="monospace">Object 89.1%</text>

  <!-- Scan line -->
  <rect x="20" y="186" width="380" height="2" fill="#6366F1" fill-opacity="0.6"/>

  <!-- Camera label -->
  <text x="36" y="298" fill="#475569" font-size="10" font-family="monospace">CAM_01 | 30fps | 1080p</text>

  <!-- Confidence graph - right top -->
  <rect x="416" y="62" width="424" height="140" rx="14" fill="#0f172a"/>
  <text x="434" y="84" fill="#94a3b8" font-size="11" font-family="system-ui">Detection Confidence (%)</text>
  <polyline points="456,170 488,154 520,162 552,140 584,148 616,128 648,138 680,114 712,122 744,108 776,116 808,102" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="434" y1="170" x2="822" y2="170" stroke="#1e293b" stroke-width="1"/>
  <line x1="434" y1="140" x2="822" y2="140" stroke="#1e293b" stroke-width="1"/>
  <line x1="434" y1="110" x2="822" y2="110" stroke="#1e293b" stroke-width="1"/>

  <!-- Stats row -->
  <rect x="416" y="216" width="198" height="96" rx="14" fill="#1E293B"/>
  <rect x="630" y="216" width="210" height="96" rx="14" fill="#1E293B"/>

  <text x="434" y="240" fill="#94a3b8" font-size="10" font-family="system-ui">Avg Accuracy</text>
  <text x="434" y="270" fill="#34d399" font-size="32" font-family="system-ui" font-weight="700">94.8%</text>
  <text x="434" y="298" fill="#475569" font-size="10" font-family="system-ui">Last 1000 detections</text>

  <text x="648" y="240" fill="#94a3b8" font-size="10" font-family="system-ui">Objects Picked</text>
  <text x="648" y="270" fill="#818cf8" font-size="32" font-family="system-ui" font-weight="700">3,247</text>
  <text x="648" y="298" fill="#475569" font-size="10" font-family="system-ui">Total successful picks</text>

  <!-- Log panel -->
  <rect x="20" y="330" width="820" height="130" rx="14" fill="#091018"/>
  <text x="38" y="352" fill="#475569" font-size="10" font-family="monospace">System Log</text>
  <text x="38" y="372" fill="#34d399" font-size="10" font-family="monospace">[INFO] Object detected at (247, 182) confidence=0.973</text>
  <text x="38" y="389" fill="#818cf8" font-size="10" font-family="monospace">[INFO] Arm trajectory computed → (x:142, y:88, z:45)</text>
  <text x="38" y="406" fill="#f8fafc" font-size="10" font-family="monospace">[INFO] Pick successful — item placed at zone B</text>
  <text x="38" y="423" fill="#fbbf24" font-size="10" font-family="monospace">[WARN] Low confidence 0.612 — requesting re-scan</text>
  <text x="38" y="440" fill="#34d399" font-size="10" font-family="monospace">[INFO] Re-scan complete — confidence=0.891 → proceed</text>
</svg>
